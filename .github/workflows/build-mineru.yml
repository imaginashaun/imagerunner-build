name: build-mineru
on:
  push:
    branches: [main]
    paths:
      - 'mineru/**'
      - '.github/workflows/build-mineru.yml'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push baked MinerU image
        uses: docker/build-push-action@v6
        with:
          context: ./mineru
          platforms: linux/amd64
          push: true
          tags: imaginashaun/mineru-runner:v3
